networks:
  rastreo-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.50.0.0/24

services:
  kafka:
    image: apache/kafka:4.3.1
    container_name: rastreo-kafka
    ports:
      - "9092:9092"
    networks:
      rastreo-net:
        ipv4_address: 10.50.0.2
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # No healthcheck: scratch image has no shell. Use host curl on localhost:8080/health instead.
  rastreo-server:
    build: .
    container_name: rastreo-server
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      rastreo-net:
        ipv4_address: 10.50.0.3
    environment:
      RASTREO_SERVER_PORT: "8080"
      RASTREO_SERVER_BIND: "0.0.0.0"

  target-1:
    image: nginx:1.31-alpine
    container_name: rastreo-target-1
    networks:
      rastreo-net:
        ipv4_address: 10.50.0.10
    expose:
      - "80"

  target-2:
    image: nginx:1.31-alpine
    container_name: rastreo-target-2
    networks:
      rastreo-net:
        ipv4_address: 10.50.0.11
    expose:
      - "80"

  target-3:
    image: nginx:1.31-alpine
    container_name: rastreo-target-3
    networks:
      rastreo-net:
        ipv4_address: 10.50.0.12
    expose:
      - "80"
