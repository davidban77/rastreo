# Default values for rastreo Helm chart.

# Number of replicas for the rastreo-server Deployment.
replicaCount: 1

image:
  # Container image repository.
  repository: ghcr.io/davidban77/rastreo
  # Image pull policy.
  pullPolicy: IfNotPresent
  # Image tag — defaults to the chart appVersion if not set.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the full resource name (release-chart).
fullnameOverride: ""

server:
  # Port the rastreo-server listens on inside the container.
  port: 8080
  # Bind address for the rastreo-server.
  bind: "0.0.0.0"

service:
  # Kubernetes Service type.
  type: ClusterIP
  # Service port (maps to server.port on the container).
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Pod-level security context. Defaults match the non-root image (UID 65532).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security context. Defaults match the non-root image (UID 65532).
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Optional inline configuration mounted at /etc/rastreo as a ConfigMap.
# Each key becomes a file under the mount path. Leave empty to skip the ConfigMap.
# Example:
#   config:
#     rastreo.yaml: |
#       targets:
#         - 10.0.0.0/24
config: {}

# Horizontal Pod Autoscaler configuration.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget configuration.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Ingress configuration.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: rastreo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ServiceMonitor for Prometheus Operator.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  path: "/metrics"
  additionalLabels: {}

# Node selector for pod scheduling.
nodeSelector: {}

# Tolerations for pod scheduling.
tolerations: []

# Affinity rules for pod scheduling.
affinity: {}
