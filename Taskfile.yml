version: "3"

tasks:
  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build:
    desc: Build the workspace (debug)
    cmds:
      - cargo build --workspace

  build:release:
    desc: Build rastreo and rastreo-server in release mode
    cmds:
      - cargo build --release -p rastreo
      - cargo build --release -p rastreo-server

  # ---------------------------------------------------------------------------
  # Test & Lint
  # ---------------------------------------------------------------------------
  test:
    desc: Run all unit and integration tests
    cmds:
      - cargo test --workspace

  lint:
    desc: Run clippy and format check
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings
      - cargo fmt --all -- --check

  check:
    desc: Run full quality gate (build + test + lint)
    cmds:
      - task: build
      - task: test
      - task: lint

  # ---------------------------------------------------------------------------
  # Utilities
  # ---------------------------------------------------------------------------
  clean:
    desc: Clean build artifacts
    cmds:
      - cargo clean

  audit:
    desc: Run cargo audit for security vulnerabilities
    cmds:
      - cargo audit

  # ---------------------------------------------------------------------------
  # Documentation site
  # ---------------------------------------------------------------------------
  site:setup:
    desc: Install MkDocs Material in a local venv (uv-managed)
    cmds:
      - |
        echo "Using uv to create venv and install dependencies..."
        uv venv docs/site/.venv
        uv pip install -r docs/site/requirements.txt --python docs/site/.venv/bin/python
        echo ""
        echo "Done! Run 'task site:serve' to preview the docs locally."

  site:build:
    desc: Build the MkDocs site (strict mode)
    deps: [site:setup]
    cmds:
      - docs/site/.venv/bin/mkdocs build --strict -f docs/site/mkdocs.yml

  site:serve:
    desc: Start local MkDocs dev server with live reload
    deps: [site:setup]
    cmds:
      - |
        echo "Docs site: http://localhost:8000"
        docs/site/.venv/bin/mkdocs serve -f docs/site/mkdocs.yml

  site:clean:
    desc: Remove the MkDocs build output and venv
    cmds:
      - rm -rf docs/site/site docs/site/.venv

  # ---------------------------------------------------------------------------
  # Local stack
  # ---------------------------------------------------------------------------
  stack:up:
    desc: Start the local development stack (Kafka, target hosts, rastreo-server)
    cmds:
      - docker compose up -d

  stack:down:
    desc: Stop and remove the local development stack
    cmds:
      - docker compose down -v

  docs:
    desc: Build and open Rust API documentation
    cmds:
      - cargo doc --workspace --no-deps --open

  fmt:
    desc: Auto-format all code
    cmds:
      - cargo fmt --all
