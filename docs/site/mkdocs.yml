site_name: rastreo
site_description: Enrichment-aware network discovery — Kafka-first, in the spirit of Sonda.
site_url: https://davidban77.github.io/rastreo/
repo_url: https://github.com/davidban77/rastreo
repo_name: davidban77/rastreo

copyright: Copyright &copy; 2026 David Flores · Built with Material for MkDocs

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  # auto_append injects shared abbreviation definitions into every page.
  # The includes/ partial sits outside docs/ so it is not published or indexed.
  - pymdownx.snippets:
      base_path:
        - docs/site/includes
      auto_append:
        - abbreviations.md
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/davidban77/rastreo
      name: rastreo on GitHub
  generator: false

nav:
  - Home: index.md
  - Get started:
      - get-started/index.md
      - Install: get-started/install.md
      - First scan: get-started/first-scan.md
  - Discover:
      - discover/index.md
      - CLI: discover/cli.md
      - Targets: discover/targets.md
      - Sinks: discover/sinks.md
  - Probe:
      - probe/index.md
  - Integrate:
      - integrate/index.md
  - Deploy:
      - deploy/index.md
  - Reference:
      - reference/index.md
